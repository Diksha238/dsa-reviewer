spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dsareviewer}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

groq:
  api:
    url: https://api.groq.com/openai/v1/chat/completions
    token: ${GROQ_API_TOKEN}

jwt:
  secret: ${JWT_SECRET:dsa-reviewer-super-secret-key-minimum-32-chars}
  expiration: 86400000

server:
  port: 8080